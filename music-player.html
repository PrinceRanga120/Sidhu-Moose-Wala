<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sidhu MooseWala — Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           ROOT VARIABLES — PARROT OS CYBERPUNK THEME
        ═══════════════════════════════════════════════════════════════ */
        :root {
            --bg-primary: #050505;
            --bg-secondary: #0a0a0a;
            --bg-card: rgba(10, 10, 10, 0.9);
            --bg-glass: rgba(15, 15, 15, 0.8);
            --bg-glass-light: rgba(255, 255, 255, 0.04);
            --text-primary: #e8e8e8;
            --text-secondary: #888888;
            --accent-green: #00ff41;
            --accent-cyan: #00d4ff;
            --accent-purple: #b829dd;
            --accent-red: #ff2a2a;
            --accent-gold: #ffd700;
            --border-glow: rgba(0, 255, 65, 0.25);
            --border-cyan: rgba(0, 212, 255, 0.25);
            --shadow-glow: 0 0 30px rgba(0, 255, 65, 0.12);
            --font-display: 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Rajdhani', sans-serif;
            --font-bio: 'Anonymous Pro', monospace;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-glass: rgba(255, 255, 255, 0.9);
            --bg-glass-light: rgba(0, 0, 0, 0.04);
            --text-primary: #111111;
            --text-secondary: #555555;
            --accent-green: #008f11;
            --accent-cyan: #0077b6;
            --accent-purple: #7b2cbf;
            --accent-red: #c41e3a;
            --accent-gold: #b8860b;
            --border-glow: rgba(0, 143, 17, 0.25);
            --border-cyan: rgba(0, 119, 182, 0.25);
            --shadow-glow: 0 0 30px rgba(0, 143, 17, 0.12);
        }

        /* ═══════════════════════════════════════════════════════════════
           RESET & BASE
        ═══════════════════════════════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: var(--transition);
            position: relative;
            line-height: 1.6;
        }

        /* ═══════════════════════════════════════════════════════════════
           CYBER BACKGROUND CANVAS
        ═══════════════════════════════════════════════════════════════ */
        #cyber-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.4;
        }
        body.light-theme #cyber-canvas { opacity: 0.2; }

        /* ═══════════════════════════════════════════════════════════════
           SCANLINE OVERLAY
        ═══════════════════════════════════════════════════════════════ */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0, 255, 65, 0.02) 2px, rgba(0, 255, 65, 0.02) 4px
            );
            pointer-events: none; z-index: 1;
            animation: scanlineMove 10s linear infinite;
        }
        @keyframes scanlineMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 120px; }
        }

        /* ═══════════════════════════════════════════════════════════════
           THEME TOGGLE
        ═══════════════════════════════════════════════════════════════ */
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: var(--bg-glass); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow); border-radius: 50px;
            padding: 10px 22px; cursor: pointer; font-family: var(--font-mono);
            font-size: 0.8rem; color: var(--accent-green);
            display: flex; align-items: center; gap: 10px;
            transition: var(--transition); box-shadow: var(--shadow-glow);
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .theme-toggle:hover {
            transform: scale(1.08); box-shadow: 0 0 40px var(--border-glow);
            border-color: var(--accent-green);
        }
        .theme-toggle svg { width: 18px; height: 18px; transition: transform 0.6s ease; }
        body.light-theme .theme-toggle svg { transform: rotate(180deg); }

        /* ═══════════════════════════════════════════════════════════════
           BACK BUTTON
        ═══════════════════════════════════════════════════════════════ */
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--bg-glass); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow); border-radius: 50px;
            padding: 10px 22px; cursor: pointer; font-family: var(--font-mono);
            font-size: 0.8rem; color: var(--accent-green);
            display: flex; align-items: center; gap: 10px;
            transition: var(--transition); box-shadow: var(--shadow-glow);
            text-decoration: none; user-select: none;
        }
        .back-btn:hover {
            transform: scale(1.08); box-shadow: 0 0 40px var(--border-glow);
            border-color: var(--accent-green);
        }
        .back-btn svg { width: 18px; height: 18px; }

        /* ═══════════════════════════════════════════════════════════════
           APP CONTAINER
        ═══════════════════════════════════════════════════════════════ */
        .app-container {
            position: relative; z-index: 2;
            display: flex; flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right)
                     env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ═══════════════════════════════════════════════════════════════
           HEADER
        ═══════════════════════════════════════════════════════════════ */
        .header {
            text-align: center; padding: 80px 20px 30px;
            position: relative;
        }
        .header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .header h1 .highlight {
            color: var(--accent-green);
            text-shadow: 0 0 30px var(--border-glow);
        }
        .header .subtitle {
            font-family: var(--font-mono);
            font-size: clamp(0.75rem, 2vw, 1rem);
            color: var(--text-secondary); letter-spacing: 3px;
            text-transform: uppercase;
        }
        .header-divider {
            width: 100px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-green), var(--accent-cyan), transparent);
            margin: 15px auto 0;
        }

        /* ═══════════════════════════════════════════════════════════════
           MEDIA TOGGLE — SONG / VIDEO
        ═══════════════════════════════════════════════════════════════ */
        .media-toggle-wrap {
            display: flex; justify-content: center;
            margin-bottom: 18px; width: 100%;
        }
        .media-toggle {
            position: relative;
            display: flex; align-items: center;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glow);
            border-radius: 50px;
            padding: 4px;
            gap: 4px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }
        .media-toggle .toggle-slider {
            position: absolute; top: 4px; left: 4px;
            width: calc(50% - 4px); height: calc(100% - 8px);
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            border-radius: 50px;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1; box-shadow: 0 0 15px rgba(0,255,65,0.3);
        }
        .media-toggle.video-active .toggle-slider {
            transform: translateX(100%);
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            box-shadow: 0 0 15px rgba(0,212,255,0.3);
        }
        .toggle-btn {
            position: relative; z-index: 2;
            background: none; border: none;
            font-family: var(--font-mono);
            font-size: 0.8rem; letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 8px 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }
        .toggle-btn.active {
            color: #000; font-weight: 700;
        }
        .toggle-btn:disabled {
            opacity: 0.3; cursor: not-allowed;
        }

        /* ═══════════════════════════════════════════════════════════════
           PLAYER CARD
        ═══════════════════════════════════════════════════════════════ */
        .player-card {
            width: 100%; max-width: 500px;
            background: var(--bg-card); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow); border-radius: 24px;
            padding: 30px; margin: 20px auto;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5),
                        0 0 80px rgba(0,255,65,0.08);
            transition: var(--transition);
        }
        .player-card:hover {
            box-shadow: 0 8px 40px rgba(0,0,0,0.6),
                        0 0 100px rgba(0,255,65,0.12);
        }
        .player-card.video-mode {
            border-color: var(--border-cyan);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5),
                        0 0 100px rgba(0,212,255,0.12);
        }

        /* Album Art / Video Container */
        .album-art {
            width: 100%; aspect-ratio: 1;
            border-radius: 16px; overflow: hidden;
            position: relative; margin-bottom: 25px;
            border: 2px solid var(--border-glow);
            box-shadow: 0 0 30px rgba(0,255,65,0.1);
            transition: aspect-ratio 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.4s ease;
            background: #000;
        }
        .player-card.video-mode .album-art {
            aspect-ratio: 16/9;
            border-color: var(--border-cyan);
            box-shadow: 0 0 40px rgba(0,212,255,0.15);
        }
        .album-art img, .album-art video {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }
        .player-card.video-mode .album-art video {
            object-fit: contain;
        }
        .album-art-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.8));
            pointer-events: none;
        }
        .playing-indicator {
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center; gap: 4px;
            padding: 6px 14px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border-radius: 20px; border: 1px solid var(--border-glow);
        }
        .playing-indicator span {
            width: 3px; background: var(--accent-green);
            border-radius: 2px;
            animation: eqBars 0.8s ease-in-out infinite;
        }
        .playing-indicator span:nth-child(1) { height: 8px; animation-delay: 0s; }
        .playing-indicator span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
        .playing-indicator span:nth-child(3) { height: 12px; animation-delay: 0.3s; }
        .playing-indicator span:nth-child(4) { height: 18px; animation-delay: 0.1s; }
        .playing-indicator span:nth-child(5) { height: 10px; animation-delay: 0.25s; }
        @keyframes eqBars {
            0%, 100% { transform: scaleY(0.6); }
            50% { transform: scaleY(1); }
        }
        .playing-indicator.paused span { animation: none; height: 4px; }

        /* Song Info */
        .song-info { text-align: center; margin-bottom: 25px; }
        .song-title {
            font-family: var(--font-display);
            font-size: 1.3rem; font-weight: 700;
            color: var(--text-primary); margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .song-artist {
            font-family: var(--font-mono);
            font-size: 0.85rem; color: var(--accent-green);
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%; margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
            border-radius: 2px;
            box-shadow: 0 0 10px var(--accent-green);
            transition: width 0.1s linear;
        }
        .player-card.video-mode .progress-fill {
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            box-shadow: 0 0 10px var(--accent-cyan);
        }
        .progress-time {
            display: flex; justify-content: space-between;
            font-family: var(--font-mono); font-size: 0.7rem;
            color: var(--text-secondary); margin-top: 6px;
        }

        /* Controls */
        .controls {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-bottom: 25px;
        }
        .control-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .control-btn:hover { color: var(--accent-green); transform: scale(1.15); }
        .control-btn:active { transform: scale(0.9); }
        .control-btn svg { width: 24px; height: 24px; }

        /* Lyrics Button — Curvy & Smooth */
        .control-btn.lyrics-btn {
            width: 48px; height: 48px;
            border-radius: 16px;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glow);
            color: var(--text-secondary);
            position: relative;
            overflow: hidden;
        }
        .control-btn.lyrics-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            opacity: 0; transition: opacity 0.3s ease;
            border-radius: 16px; z-index: 0;
        }
        .control-btn.lyrics-btn:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 20px var(--border-glow);
            transform: scale(1.1);
        }
        .control-btn.lyrics-btn.active {
            border-color: var(--accent-green);
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 25px var(--border-glow);
        }
        .control-btn.lyrics-btn.active::before {
            opacity: 1;
        }
        .control-btn.lyrics-btn svg {
            position: relative; z-index: 1;
            width: 20px; height: 20px;
        }

        .control-btn.play-pause {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            color: #000;
            box-shadow: 0 0 30px rgba(0,255,65,0.3);
        }
        .player-card.video-mode .control-btn.play-pause {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            box-shadow: 0 0 30px rgba(0,212,255,0.3);
        }
        .control-btn.play-pause:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0,255,65,0.5);
        }
        .player-card.video-mode .control-btn.play-pause:hover {
            box-shadow: 0 0 50px rgba(0,212,255,0.5);
        }
        .control-btn.play-pause svg { width: 28px; height: 28px; }

        /* Volume */
        .volume-container {
            display: flex; align-items: center; gap: 12px;
            padding: 0 10px;
        }
        .volume-container svg {
            width: 18px; height: 18px;
            color: var(--text-secondary); flex-shrink: 0;
        }
        .volume-slider {
            flex: 1; height: 4px;
            -webkit-appearance: none; appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 2px; outline: none; cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 14px; height: 14px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            cursor: pointer; border: none;
        }

        /* ═══════════════════════════════════════════════════════════════
           LYRICS PANEL
        ═══════════════════════════════════════════════════════════════ */
        .lyrics-panel {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.4s ease,
                        margin 0.4s ease;
            margin-top: 0;
        }
        .lyrics-panel.open {
            max-height: 420px; opacity: 1; margin-top: 22px;
        }
        .lyrics-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; padding: 0 4px;
        }
        .lyrics-header-label {
            font-family: var(--font-mono);
            font-size: 0.7rem; color: var(--accent-green);
            letter-spacing: 3px; text-transform: uppercase;
            display: flex; align-items: center; gap: 8px;
        }
        .lyrics-header-label::before {
            content: '▶'; font-size: 0.6rem;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .lyrics-sync-hint {
            font-family: var(--font-mono); font-size: 0.6rem;
            color: var(--text-secondary); opacity: 0.7;
        }

        .lyrics-container {
            max-height: 340px; overflow-y: auto;
            padding: 20px 16px;
            background: linear-gradient(180deg, var(--bg-glass), rgba(0,0,0,0.4));
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            scroll-behavior: smooth;
            position: relative;
        }
        .lyrics-container::-webkit-scrollbar { width: 4px; }
        .lyrics-container::-webkit-scrollbar-track { background: transparent; }
        .lyrics-container::-webkit-scrollbar-thumb {
            background: var(--accent-green); border-radius: 4px;
        }
        .lyrics-line {
            font-family: var(--font-bio);
            font-size: 0.92rem; color: var(--text-secondary);
            padding: 10px 14px; margin: 6px 0;
            border-radius: 10px; cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center; line-height: 1.7;
            opacity: 0.55; position: relative;
            user-select: none;
        }
        .lyrics-line:hover {
            background: rgba(0,255,65,0.06);
            color: var(--text-primary);
            opacity: 0.85;
            transform: translateX(4px);
        }
        .lyrics-line.active {
            color: var(--accent-green);
            font-size: 1.08rem; font-weight: 700;
            opacity: 1;
            text-shadow: 0 0 25px rgba(0,255,65,0.25),
                         0 0 50px rgba(0,255,65,0.1);
            background: rgba(0,255,65,0.08);
            transform: scale(1.04);
            border: 1px solid rgba(0,255,65,0.15);
        }
        .lyrics-line.section-tag {
            font-family: var(--font-mono);
            font-size: 0.65rem; color: var(--accent-cyan);
            letter-spacing: 4px; text-transform: uppercase;
            margin-top: 18px; margin-bottom: 8px;
            opacity: 0.7; cursor: default; pointer-events: none;
        }
        .lyrics-line.section-tag:first-child { margin-top: 0; }
        .lyrics-line.section-tag:hover {
            background: none; transform: none; opacity: 0.7;
        }

        /* Center indicator for scroll-sync */
        .lyrics-center-line {
            position: absolute; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
            opacity: 0.15; pointer-events: none;
            top: 50%; transform: translateY(-50%);
        }

        /* ═══════════════════════════════════════════════════════════════
           PLAYLIST
        ═══════════════════════════════════════════════════════════════ */
        .playlist-section {
            width: 100%; max-width: 700px;
            padding: 20px; margin-top: 10px;
        }
        .playlist-title {
            font-family: var(--font-display);
            font-size: 1.1rem; font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--accent-cyan); margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .playlist-title::before {
            content: '▶'; font-size: 0.7rem; color: var(--accent-green);
        }
        .playlist {
            display: flex; flex-direction: column; gap: 8px;
        }
        .playlist-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px 16px;
            background: var(--bg-glass-light);
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        .playlist-item:hover {
            background: var(--bg-glass);
            border-color: var(--border-glow);
            transform: translateX(5px);
        }
        .playlist-item.active {
            border-color: var(--accent-green);
            background: rgba(0,255,65,0.05);
            box-shadow: 0 0 20px rgba(0,255,65,0.1);
        }
        .playlist-item .track-num {
            font-family: var(--font-mono); font-size: 0.75rem;
            color: var(--text-secondary); width: 24px; text-align: center;
        }
        .playlist-item.active .track-num {
            color: var(--accent-green);
        }
        .playlist-item .track-info {
            flex: 1;
        }
        .playlist-item .track-name {
            font-family: var(--font-body); font-size: 0.95rem;

                line.classList.toggle('active', idx === activeIndex);
            });

            if (lyricsOpen && isAutoScrolling) {
                scrollToActiveLyric();
            }
        }

        function scrollToActiveLyric(instant = false) {
            const active = lyricsContainer.querySelector('.lyrics-line.active');
            if (!active) return;
            const containerRect = lyricsContainer.getBoundingClientRect();
            const activeRect = active.getBoundingClientRect();
            const scrollTop = lyricsContainer.scrollTop + (activeRect.top - containerRect.top) - (containerRect.height / 2) + (activeRect.height / 2);
            lyricsContainer.scrollTo({
                top: Math.max(0, scrollTop),
                behavior: instant ? 'auto' : 'smooth'
            });
        }

        function seekToLyricTime(time) {
            if (videoMode) {
                videoEl.currentTime = time;
            } else {
                audio.currentTime = time;
            }
            if (!isPlaying) togglePlay();
            isAutoScrolling = true;
            setTimeout(() => scrollToActiveLyric(true), 50);
        }

        // Scroll-to-seek: detect center line when user scrolls manually
        lyricsContainer.addEventListener('scroll', () => {
            isAutoScrolling = false;
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                const containerRect = lyricsContainer.getBoundingClientRect();
                const centerY = containerRect.top + containerRect.height / 2;
                const lines = lyricsContainer.querySelectorAll('.lyrics-line:not(.section-tag)');
                let closestLine = null;
                let closestDist = Infinity;

                lines.forEach(line => {
                    const rect = line.getBoundingClientRect();
                    const lineCenter = rect.top + rect.height / 2;
                    const dist = Math.abs(lineCenter - centerY);
                    if (dist < closestDist) {
                        closestDist = dist;
                        closestLine = line;
                    }
                });

                if (closestLine && closestDist < 60) {
                    const t = parseFloat(closestLine.dataset.time);
                    if (!isNaN(t)) {
                        if (videoMode) videoEl.currentTime = t;
                        else audio.currentTime = t;
                    }
                }

                // Resume auto-scroll after 2.5s if still playing
                setTimeout(() => { isAutoScrolling = true; }, 2500);
            }, 400);
        });

        // ═══════════════════════════════════════════════════════════════
        // PLAYBACK CONTROLS
        // ═══════════════════════════════════════════════════════════════
        function togglePlay() {
            const media = videoMode ? videoEl : audio;
            if (media.paused) {
                media.play().then(() => {
                    isPlaying = true;
                    updatePlayButton();
                }).catch(err => console.log('Play failed:', err));
            } else {
                media.pause();
                isPlaying = false;
                updatePlayButton();
            }
        }

        function playSongAt(index) {
            currentIndex = index;
            loadSong(currentIndex);
            const media = videoMode ? videoEl : audio;
            media.play().then(() => {
                isPlaying = true;
                updatePlayButton();
            }).catch(err => console.log('Play failed:', err));
        }

        function nextSong() {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadSong(currentIndex);
            if (isPlaying) {
                const media = videoMode ? videoEl : audio;
                media.play().catch(() => {});
            }
        }

        function prevSong() {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentIndex);
            if (isPlaying) {
                const media = videoMode ? videoEl : audio;
                media.play().catch(() => {});
            }
        }

        function updatePlayButton() {
            const media = videoMode ? videoEl : audio;
            if (isPlaying && !media.paused) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                eqBars.classList.remove('paused');
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                eqBars.classList.add('paused');
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // PROGRESS & TIME
        // ═══════════════════════════════════════════════════════════════
        function onTimeUpdate() {
            const media = videoMode ? videoEl : audio;
            if (!media.duration) return;
            const percent = (media.currentTime / media.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(media.currentTime);
            updateActiveLyric();
        }

        audio.addEventListener('timeupdate', () => { if (!videoMode) onTimeUpdate(); });
        videoEl.addEventListener('timeupdate', () => { if (videoMode) onTimeUpdate(); });

        audio.addEventListener('loadedmetadata', () => {
            if (!videoMode) totalTimeEl.textContent = formatTime(audio.duration);
        });
        videoEl.addEventListener('loadedmetadata', () => {
            if (videoMode) totalTimeEl.textContent = formatTime(videoEl.duration);
        });

        audio.addEventListener('ended', () => { if (!videoMode) nextSong(); });
        videoEl.addEventListener('ended', () => { if (videoMode) nextSong(); });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const media = videoMode ? videoEl : audio;
            if (media.duration) {
                media.currentTime = percent * media.duration;
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${String(secs).padStart(2, '0')}`;
        }

        // ═══════════════════════════════════════════════════════════════
        // VOLUME
        // ═══════════════════════════════════════════════════════════════
        volumeSlider.addEventListener('input', updateVolume);

        function updateVolume() {
            const vol = volumeSlider.value / 100;
            audio.volume = vol;
            videoEl.volume = vol;
        }

        // ═══════════════════════════════════════════════════════════════
        // THEME TOGGLE
        // ═══════════════════════════════════════════════════════════════
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') document.body.classList.add('light-theme');
        })();

        // ═══════════════════════════════════════════════════════════════
        // CYBER CANVAS BACKGROUND
        // ═══════════════════════════════════════════════════════════════
        const canvas = document.getElementById('cyber-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        const COUNT = 50;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.color = Math.random() > 0.5 ? '#00ff41' : '#00d4ff';
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity;
                ctx.fill(); ctx.globalAlpha = 1;
            }
        }
        function initParticles() {
            particles = [];
            for (let i = 0; i < COUNT; i++) particles.push(new Particle());
        }
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = '#00ff41';
                        ctx.globalAlpha = (1 - dist / 120) * 0.08;
                        ctx.lineWidth = 0.3;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke(); ctx.globalAlpha = 1;
                    }
                }
            }
        }
        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            connectParticles();
            requestAnimationFrame(animateCanvas);
        }
        resize(); initParticles(); animateCanvas();
        window.addEventListener('resize', () => { resize(); initParticles(); });

        // ═══════════════════════════════════════════════════════════════
        // START
        // ═══════════════════════════════════════════════════════════════
        init();
    </script>
</body>
</html>
